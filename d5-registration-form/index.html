<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D5 Registration Form</title>
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
</head>
<body>
  <main class="page">
    <form class="form-card" novalidate>
      <header class="form-header">
        <p>D5 Form Handling</p>
        <h1>Registration</h1>
      </header>

      <div class="field" data-field="name">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" autocomplete="name">
        <p class="error" id="name-error" aria-live="polite"></p>
      </div>

      <div class="field" data-field="email">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email">
        <p class="error" id="email-error" aria-live="polite"></p>
      </div>

      <div class="field" data-field="phone">
        <label for="phone">Phone</label>
        <input id="phone" name="phone" type="tel" autocomplete="tel" placeholder="10-15 digits">
        <p class="error" id="phone-error" aria-live="polite"></p>
      </div>

      <div class="field" data-field="password">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password">
        <div class="strength" aria-label="Password strength">
          <span class="strength-bar" data-strength-bar></span>
        </div>
        <p class="hint" data-strength-text>Use at least 8 chars, 1 uppercase, 1 number, and 1 special.</p>
        <p class="error" id="password-error" aria-live="polite"></p>
      </div>

      <div class="field" data-field="confirm">
        <label for="confirm">Confirm Password</label>
        <input id="confirm" name="confirm" type="password" autocomplete="new-password">
        <p class="error" id="confirm-error" aria-live="polite"></p>
      </div>

      <button class="submit-button" type="submit" disabled>Create account</button>
      <p class="form-message" aria-live="polite"></p>
    </form>
  </main>
</body>
</html>
