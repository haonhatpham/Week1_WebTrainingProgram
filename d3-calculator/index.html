<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanilla JS Calculator</title>
  <link rel="stylesheet" href="styles.css">
  <script src="calculator.js" defer></script>
  <script src="ui.js" defer></script>
</head>
<body>
  <main class="page">
    <section class="calculator" aria-labelledby="calculator-title">
      <header class="calculator-header">
        <p>Vanilla JavaScript</p>
        <h1 id="calculator-title">Calculator</h1>
      </header>

      <output class="display" id="display" aria-live="polite">0</output>

      <div class="buttons" aria-label="Calculator buttons">
        <button type="button" data-action="clear">C</button>
        <button type="button" data-action="operator" data-operator="÷">÷</button>
        <button type="button" data-action="operator" data-operator="×">×</button>
        <button type="button" data-action="operator" data-operator="-">-</button>

        <button type="button" data-value="7">7</button>
        <button type="button" data-value="8">8</button>
        <button type="button" data-value="9">9</button>
        <button type="button" data-action="operator" data-operator="+">+</button>

        <button type="button" data-value="4">4</button>
        <button type="button" data-value="5">5</button>
        <button type="button" data-value="6">6</button>
        <button type="button" data-action="equals">=</button>

        <button type="button" data-value="1">1</button>
        <button type="button" data-value="2">2</button>
        <button type="button" data-value="3">3</button>
        <button type="button" data-action="decimal">.</button>

        <button type="button" class="zero" data-value="0">0</button>
      </div>
    </section>

    <aside class="history-panel" aria-labelledby="history-title">
      <h2 id="history-title">History</h2>
      <ol id="history-list">
        <li>No calculations yet.</li>
      </ol>
    </aside>
  </main>
</body>
</html>
